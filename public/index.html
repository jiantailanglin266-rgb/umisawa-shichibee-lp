<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <title>UNAZAWA SHICHIBEE SAUNA &amp; SPA</title>
    <link rel="canonical" href="https://jiantailanglin266-rgb.github.io/umisawa-shichibee-lp/ja/" />
    <script>
      (function () {
        var langs = (navigator.languages && navigator.languages.length)
          ? navigator.languages : [navigator.language || "ja"];
        var loc = "ja";
        for (var i = 0; i < langs.length; i++) {
          var l = (langs[i] || "").toLowerCase();
          if (l.indexOf("ja") === 0) { loc = "ja"; break; }
          if (l.indexOf("zh") === 0) { loc = "zh"; break; }
          if (l.indexOf("ko") === 0) { loc = "ko"; break; }
          if (l.indexOf("en") === 0) { loc = "en"; break; }
        }
        // 相対遷移なので basePath に依存しない
        location.replace(loc + "/");
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=ja/" />
  </head>
  <body style="background:#0d0d0d;color:#f5f1e8;font-family:serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0">

        <a href="ja/" style="color:#b89b5e">日本語</a> ·

        <a href="zh/" style="color:#b89b5e">简体中文</a> ·
        <a href="ko/" style="color:#b89b5e">한국어</a>
      </p>
    </noscript>
